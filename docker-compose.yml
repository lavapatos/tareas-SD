services:

  # --- tarea 2: kafka y zookeeper ---

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    # kafka necesita que zookeeper este corriendo primero

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      # 8 particiones para poder escalar hasta 8 consumidores despues
      KAFKA_NUM_PARTITIONS: 8
    depends_on:
      - zookeeper
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  # --- fin tarea 2 ---

  redis:
    image: redis:7
    command: redis-server --maxmemory ${REDIS_MAXMEMORY} --maxmemory-policy ${REDIS_POLICY}
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 10

  generador_respuestas:
    build: ./generador_respuestas
    volumes:
      - ./dataset:/app/dataset
    ports:
      - "8002:8002"
    environment:
      - FALLA_RATE=${FALLA_RATE}
      - LATENCY_ARTIFICIAL=${LATENCY_ARTIFICIAL}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/docs')"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

  cache_service:
    build: ./cache
    ports:
      - "8001:8001"
    environment:
      - TTL_BASE=${TTL_BASE}
      - PADDING_KB=${PADDING_KB}
    depends_on:
      redis:
        condition: service_healthy
      generador_respuestas:
        condition: service_healthy

  generador_trafico:
    build: ./generador_trafico
    environment:
      - N_CONSULTAS=${N_CONSULTAS}
      - DISTRIBUCION=${DISTRIBUCION}
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS}
      - KAFKA_TOPIC=${KAFKA_TOPIC}
      - SEND_RATE=${SEND_RATE}
      - SPIKE_ENABLED=${SPIKE_ENABLED}
      - SPIKE_AT=${SPIKE_AT}
      - SPIKE_DURATION=${SPIKE_DURATION}
      - SPIKE_RATE=${SPIKE_RATE}
    depends_on:
      kafka:
        condition: service_healthy

  consumidor:
    build: ./consumidor
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS}
      - KAFKA_TOPIC=${KAFKA_TOPIC}
      - KAFKA_GROUP=grupo_consumidores
      - MAX_RETRIES=${MAX_RETRIES}
      - CACHE_URL=http://cache_service:8001
      - REDIS_HOST=redis
    depends_on:
      kafka:
        condition: service_healthy
      cache_service:
        condition: service_started

  gestor_reintentos:
    build: ./gestor_reintentos
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS}
      - KAFKA_TOPIC=${KAFKA_TOPIC}
    depends_on:
      kafka:
        condition: service_healthy

  recolector:
    build: ./metricas
    command: python recolector.py
    volumes:
      - ./output:/app/output
    depends_on:
      redis:
        condition: service_healthy

  analizador:
    build: ./metricas
    command: python analizador.py
    volumes:
      - ./output:/app/output

  monitor_lag:
    build: ./metricas
    command: python ver_lag.py
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS}
    volumes:
      - ./output:/app/output
    depends_on:
      kafka:
        condition: service_healthy
